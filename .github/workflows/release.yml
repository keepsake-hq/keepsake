name: release

# Two ways to cut a release:
#   • push a version tag:            git push origin v0.1.0
#   • or click "Run workflow" in the Actions tab (no terminal) and type the tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

# Only the built-in token is needed — no Apple secrets, no PATs, nothing that ties
# this build to a person.
permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14 # Apple Silicon (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, Apple Silicon target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: clippy

      - name: Test gate — nothing ships unless clippy + tests are green
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Cache cargo build (standalone workspace inside the app dir)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install UI deps + compile Tailwind CSS
        working-directory: apps/desktop
        run: |
          # pnpm 11 exits non-zero just because it skips an optional dep's build
          # script (@parcel/watcher, only used for --watch); the install succeeds.
          # `|| true` ignores that, and we invoke the Tailwind binary DIRECTLY rather
          # than via `pnpm exec` (which re-runs a deps check that hits the same gate).
          pnpm install --no-frozen-lockfile || true
          ./node_modules/.bin/tailwindcss -i ./ui/src/input.css -o ./ui/output.css --minify

      - name: Resolve release tag
        id: rel
        run: echo "tag=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build & publish Keepsake (.dmg, ad-hoc signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc signing only (also pinned in tauri.conf.json). No Apple credentials,
          # so no legal identity is embedded in the binary or the release.
          APPLE_SIGNING_IDENTITY: '-'
          # Updater signing — set these as GitHub Actions secrets. The private key signs the
          # update bundles; the matching public key is pinned in tauri.conf.json (plugins.updater).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ steps.rel.outputs.tag }}
          releaseName: 'Keepsake ${{ steps.rel.outputs.tag }}'
          releaseBody: |
            **Keepsake for macOS (Apple Silicon).**

            This build is **unsigned / ad-hoc** on purpose — notarization would tie the
            app to a paid Apple identity, and Keepsake ships anonymously. On first launch,
            **right-click the app → Open** (or System Settings → Privacy & Security →
            "Open Anyway"). One time only.

            First unlock downloads the local embedding model once (~500 MB) into
            `~/.keepsake/models`; afterwards the app runs fully offline. No accounts, no
            telemetry. Prefer zero trust? Build it yourself from source.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin --bundles app dmg

  # Desktop apps for Windows + Linux, so anyone can download Keepsake — not only macOS. The
  # macOS job already ran the clippy/test gate (platform-agnostic), so this just builds and
  # attaches the installers to the same release. includeUpdaterJson is false here so it does
  # NOT overwrite the macOS latest.json; a single merged cross-platform updater feed is a
  # follow-up. Requires the same TAURI_SIGNING_* secrets as the macOS job.
  release-desktop-other:
    needs: release-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-24.04
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Linux desktop system dependencies (webkit2gtk, etc.)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo build (standalone workspace inside the app dir)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install UI deps + compile Tailwind CSS
        working-directory: apps/desktop
        run: |
          pnpm install --no-frozen-lockfile || true
          ./node_modules/.bin/tailwindcss -i ./ui/src/input.css -o ./ui/output.css --minify

      - name: Resolve release tag
        id: rel
        run: echo "tag=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build & attach Keepsake desktop (Windows / Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ steps.rel.outputs.tag }}
          releaseName: 'Keepsake ${{ steps.rel.outputs.tag }}'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  # Linux server binaries (the hub, CLI and proxy) — so Keepsake can run as a shared
  # memory hub on a VPS, not only the macOS desktop. Attached to the same release.
  release-linux:
    needs: release-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2

      - name: Resolve release tag
        id: rel
        run: echo "tag=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build Linux binaries (hub + cli + proxy)
        run: cargo build --release -p keepsake-daemon -p keepsake-cli -p keepsake-proxy

      - name: Package + checksum
        run: |
          mkdir -p dist
          tar -C target/release -czf dist/keepsake-linux-x86_64.tar.gz keepsake-daemon keepsake keepsake-proxy
          ( cd dist && sha256sum keepsake-linux-x86_64.tar.gz > keepsake-linux-x86_64.tar.gz.sha256 )

      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: |
            dist/keepsake-linux-x86_64.tar.gz
            dist/keepsake-linux-x86_64.tar.gz.sha256
